<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h1><i class="fas fa-cloud"></i> WeatherHub</h1>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search city..." class="search-input">
                <button id="searchBtn" class="search-btn"><i class="fas fa-search"></i></button>
                <button id="locationBtn" class="location-btn" title="Current Location"><i class="fas fa-map-marker-alt"></i></button>
            </div>

            <nav class="sidebar-nav">
                <button class="nav-btn active" data-view="current">
                    <i class="fas fa-cloud-sun"></i> Current
                </button>
                <button class="nav-btn" data-view="forecast">
                    <i class="fas fa-calendar"></i> Forecast
                </button>
                <button class="nav-btn" data-view="hourly">
                    <i class="fas fa-clock"></i> Hourly
                </button>
                <button class="nav-btn" data-view="details">
                    <i class="fas fa-info-circle"></i> Details
                </button>
            </nav>

            <div class="sidebar-footer">
                <button id="toggleUnits" class="unit-toggle">
                    <i class="fas fa-temperature-high"></i> °C / °F
                </button>
                <button id="refreshBtn" class="refresh-btn">
                    <i class="fas fa-sync-alt"></i> Refresh
                </button>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Error Alert -->
            <div id="errorAlert" class="alert alert-error hidden">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorMessage"></span>
            </div>

            <!-- Loading State -->
            <div id="loadingSpinner" class="loading-spinner hidden">
                <div class="spinner"></div>
                <p>Loading weather data...</p>
            </div>

            <!-- Current Weather View -->
            <section id="currentView" class="view active">
                <div class="weather-header">
                    <h2 id="cityName" class="city-title"></h2>
                    <p id="currentDateTime" class="datetime"></p>
                </div>

                <div class="weather-main-card">
                    <div class="weather-icon-large">
                        <i id="mainWeatherIcon" class="fas fa-cloud"></i>
                    </div>
                    <div class="weather-info-main">
                        <div class="temp-display">
                            <span id="mainTemp" class="temp-value">--</span>
                            <span class="temp-unit">°C</span>
                        </div>
                        <p id="weatherDescription" class="weather-desc">--</p>
                        <p id="feelsLike" class="feels-like">Feels like --°</p>
                    </div>
                </div>

                <div class="weather-stats">
                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-droplets"></i></div>
                        <div class="stat-content">
                            <span class="stat-label">Humidity</span>
                            <span id="humidity" class="stat-value">--%</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-wind"></i></div>
                        <div class="stat-content">
                            <span class="stat-label">Wind Speed</span>
                            <span id="windSpeed" class="stat-value">-- m/s</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-gauge"></i></div>
                        <div class="stat-content">
                            <span class="stat-label">Pressure</span>
                            <span id="pressure" class="stat-value">-- hPa</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-eye"></i></div>
                        <div class="stat-content">
                            <span class="stat-label">Visibility</span>
                            <span id="visibility" class="stat-value">-- km</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-cloud-rain"></i></div>
                        <div class="stat-content">
                            <span class="stat-label">Precipitation</span>
                            <span id="precipitation" class="stat-value">--%</span>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon"><i class="fas fa-sun"></i></div>
                        <div class="stat-content">
                            <span class="stat-label">UV Index</span>
                            <span id="uvIndex" class="stat-value">--</span>
                        </div>
                    </div>
                </div>

                <div class="sun-info">
                    <div class="sun-item">
                        <i class="fas fa-sunrise"></i>
                        <div>
                            <span class="sun-label">Sunrise</span>
                            <span id="sunrise" class="sun-time">--:--</span>
                        </div>
                    </div>
                    <div class="sun-item">
                        <i class="fas fa-sunset"></i>
                        <div>
                            <span class="sun-label">Sunset</span>
                            <span id="sunset" class="sun-time">--:--</span>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 5-Day Forecast View -->
            <section id="forecastView" class="view">
                <h3 class="view-title">5-Day Forecast</h3>
                <div id="forecastContainer" class="forecast-grid"></div>
            </section>

            <!-- Hourly Forecast View -->
            <section id="hourlyView" class="view">
                <h3 class="view-title">Hourly Forecast (24 Hours)</h3>
                <div id="hourlyContainer" class="hourly-scroll"></div>
            </section>

            <!-- Details View -->
            <section id="detailsView" class="view">
                <h3 class="view-title">Weather Details</h3>
                <div id="detailsContainer" class="details-grid"></div>
            </section>

            <!-- Saved Locations -->
            <section class="saved-locations-section">
                <h3 class="section-title">Saved Locations</h3>
                <div id="savedLocationsContainer" class="saved-locations-grid"></div>
            </section>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
